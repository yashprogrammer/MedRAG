AWSTemplateFormatVersion: "2010-09-09"
Description: MedRAG production infrastructure on a single EC2 instance.

Parameters:
  ProjectSlug:
    Type: String
    Default: medrag-prod
    AllowedPattern: "^[a-z0-9-]+$"
  VpcId:
    Type: AWS::EC2::VPC::Id
  SubnetId:
    Type: AWS::EC2::Subnet::Id
  InstanceType:
    Type: String
    Default: t3.large
  InstanceVolumeSize:
    Type: Number
    Default: 50
    MinValue: 20
  GitHubOwner:
    Type: String
  GitHubRepository:
    Type: String
  GitHubBranch:
    Type: String
    Default: main
  ExistingGitHubOidcProviderArn:
    Type: String
    Default: ""
  SecretName:
    Type: String
    Default: medrag/prod/app
  AmiId:
    Type: AWS::SSM::Parameter::Value<AWS::EC2::Image::Id>
    Default: /aws/service/ami-amazon-linux-latest/al2023-ami-kernel-default-x86_64

Conditions:
  CreateGitHubOidcProvider: !Equals [!Ref ExistingGitHubOidcProviderArn, ""]

Resources:
  DeploymentBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub "${ProjectSlug}-${AWS::AccountId}-${AWS::Region}-deployments"
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      OwnershipControls:
        Rules:
          - ObjectOwnership: BucketOwnerEnforced
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      VersioningConfiguration:
        Status: Enabled
      Tags:
        - Key: Name
          Value: !Sub "${ProjectSlug}-deployments"

  EcrRepository:
    Type: AWS::ECR::Repository
    Properties:
      EmptyOnDelete: true
      ImageScanningConfiguration:
        ScanOnPush: true
      ImageTagMutability: MUTABLE
      RepositoryName: !Sub "${ProjectSlug}-app"
      Tags:
        - Key: Name
          Value: !Sub "${ProjectSlug}-app"

  AppSecret:
    Type: AWS::SecretsManager::Secret
    Properties:
      Description: !Sub "Runtime secrets for ${ProjectSlug}"
      Name: !Ref SecretName
      SecretString: '{"OPENAI_API_KEY":"REPLACE_ME","LLAMA_CLOUD_API_KEY":"REPLACE_ME"}'
      Tags:
        - Key: Name
          Value: !Sub "${ProjectSlug}-runtime"

  GitHubOidcProvider:
    Type: AWS::IAM::OIDCProvider
    Condition: CreateGitHubOidcProvider
    Properties:
      ClientIdList:
        - sts.amazonaws.com
      ThumbprintList:
        - "6938fd4d98bab03faadb97b34396831e3780aea1"
      Url: https://token.actions.githubusercontent.com

  GitHubActionsRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${ProjectSlug}-github-actions"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Federated: !If
                - CreateGitHubOidcProvider
                - !Ref GitHubOidcProvider
                - !Ref ExistingGitHubOidcProviderArn
            Action: sts:AssumeRoleWithWebIdentity
            Condition:
              StringEquals:
                token.actions.githubusercontent.com:aud: sts.amazonaws.com
              StringLike:
                token.actions.githubusercontent.com:sub: !Sub "repo:${GitHubOwner}/${GitHubRepository}:ref:refs/heads/${GitHubBranch}"
      Policies:
        - PolicyName: MedragGitHubActionsAccess
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - cloudformation:CreateChangeSet
                  - cloudformation:CreateStack
                  - cloudformation:DeleteChangeSet
                  - cloudformation:DeleteStack
                  - cloudformation:Describe*
                  - cloudformation:ExecuteChangeSet
                  - cloudformation:GetTemplate*
                  - cloudformation:List*
                  - cloudformation:UpdateStack
                  - cloudformation:UpdateTerminationProtection
                  - ec2:AllocateAddress
                  - ec2:AssociateAddress
                  - ec2:AttachVolume
                  - ec2:AuthorizeSecurityGroupEgress
                  - ec2:AuthorizeSecurityGroupIngress
                  - ec2:CreateSecurityGroup
                  - ec2:CreateTags
                  - ec2:DeleteSecurityGroup
                  - ec2:DeleteTags
                  - ec2:Describe*
                  - ec2:DisassociateAddress
                  - ec2:ModifyInstanceAttribute
                  - ec2:ReleaseAddress
                  - ec2:RevokeSecurityGroupEgress
                  - ec2:RevokeSecurityGroupIngress
                  - ec2:RunInstances
                  - ec2:TerminateInstances
                  - ecr:BatchCheckLayerAvailability
                  - ecr:BatchGetImage
                  - ecr:CompleteLayerUpload
                  - ecr:CreateRepository
                  - ecr:DeleteRepository
                  - ecr:Describe*
                  - ecr:GetAuthorizationToken
                  - ecr:GetDownloadUrlForLayer
                  - ecr:InitiateLayerUpload
                  - ecr:List*
                  - ecr:PutImage
                  - ecr:SetRepositoryPolicy
                  - ecr:TagResource
                  - ecr:UntagResource
                  - ecr:UploadLayerPart
                  - iam:AddRoleToInstanceProfile
                  - iam:AttachRolePolicy
                  - iam:CreateInstanceProfile
                  - iam:CreateOpenIDConnectProvider
                  - iam:CreateRole
                  - iam:DeleteInstanceProfile
                  - iam:DeleteOpenIDConnectProvider
                  - iam:DeleteRole
                  - iam:DeleteRolePolicy
                  - iam:DetachRolePolicy
                  - iam:Get*
                  - iam:List*
                  - iam:PassRole
                  - iam:PutRolePolicy
                  - iam:RemoveRoleFromInstanceProfile
                  - iam:TagOpenIDConnectProvider
                  - iam:TagRole
                  - iam:UntagOpenIDConnectProvider
                  - iam:UntagRole
                  - iam:UpdateAssumeRolePolicy
                  - s3:CreateBucket
                  - s3:DeleteBucket
                  - s3:DeleteBucketPolicy
                  - s3:DeleteObject
                  - s3:DeleteObjectVersion
                  - s3:GetBucket*
                  - s3:GetEncryptionConfiguration
                  - s3:GetObject
                  - s3:ListBucket
                  - s3:ListBucketVersions
                  - s3:PutBucketEncryption
                  - s3:PutBucketOwnershipControls
                  - s3:PutBucketPublicAccessBlock
                  - s3:PutBucketTagging
                  - s3:PutBucketVersioning
                  - s3:PutObject
                  - secretsmanager:CreateSecret
                  - secretsmanager:DeleteSecret
                  - secretsmanager:DescribeSecret
                  - secretsmanager:GetSecretValue
                  - secretsmanager:PutSecretValue
                  - secretsmanager:TagResource
                  - secretsmanager:UntagResource
                  - secretsmanager:UpdateSecret
                  - ssm:DescribeInstanceInformation
                  - ssm:GetCommandInvocation
                  - ssm:ListCommandInvocations
                  - ssm:SendCommand
                Resource: "*"

  AppInstanceRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${ProjectSlug}-ec2"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: ec2.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore
      Policies:
        - PolicyName: MedragRuntimeAccess
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - ecr:GetAuthorizationToken
                  - ecr:BatchCheckLayerAvailability
                  - ecr:BatchGetImage
                  - ecr:GetDownloadUrlForLayer
                Resource: "*"
              - Effect: Allow
                Action:
                  - secretsmanager:GetSecretValue
                  - secretsmanager:DescribeSecret
                Resource: !Ref AppSecret
              - Effect: Allow
                Action:
                  - s3:GetObject
                Resource: !Sub "${DeploymentBucket.Arn}/*"
              - Effect: Allow
                Action:
                  - s3:GetBucketLocation
                  - s3:ListBucket
                Resource: !GetAtt DeploymentBucket.Arn

  AppInstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      InstanceProfileName: !Sub "${ProjectSlug}-ec2"
      Roles:
        - !Ref AppInstanceRole

  AppSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: !Sub "Public access for ${ProjectSlug}"
      GroupName: !Sub "${ProjectSlug}-sg"
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: 0.0.0.0/0
      SecurityGroupEgress:
        - IpProtocol: -1
          CidrIp: 0.0.0.0/0
      Tags:
        - Key: Name
          Value: !Sub "${ProjectSlug}-sg"

  AppInstance:
    Type: AWS::EC2::Instance
    Properties:
      IamInstanceProfile: !Ref AppInstanceProfile
      ImageId: !Ref AmiId
      InstanceType: !Ref InstanceType
      MetadataOptions:
        HttpEndpoint: enabled
        HttpTokens: required
      SecurityGroupIds:
        - !Ref AppSecurityGroup
      SubnetId: !Ref SubnetId
      BlockDeviceMappings:
        - DeviceName: /dev/xvda
          Ebs:
            DeleteOnTermination: true
            Encrypted: true
            VolumeSize: !Ref InstanceVolumeSize
            VolumeType: gp3
      Tags:
        - Key: Name
          Value: !Sub "${ProjectSlug}-ec2"
      UserData:
        Fn::Base64: !Sub |
          #!/bin/bash
          set -euo pipefail
          dnf update -y
          dnf install -y docker docker-compose-plugin jq tar gzip unzip awscli
          systemctl enable --now docker
          systemctl enable --now amazon-ssm-agent || true
          install -d -m 0755 /opt/medrag/app/releases
          install -d -m 0755 /opt/medrag/data/qdrant
          install -d -m 0755 /opt/medrag/data/medrag
          install -d -m 0755 /opt/medrag/runtime
          if id ec2-user >/dev/null 2>&1; then
            usermod -aG docker ec2-user || true
            chown -R ec2-user:ec2-user /opt/medrag
          fi

  AppElasticIp:
    Type: AWS::EC2::EIP
    Properties:
      Domain: vpc
      Tags:
        - Key: Name
          Value: !Sub "${ProjectSlug}-eip"

  AppElasticIpAssociation:
    Type: AWS::EC2::EIPAssociation
    Properties:
      AllocationId: !GetAtt AppElasticIp.AllocationId
      InstanceId: !Ref AppInstance

Outputs:
  InstanceId:
    Value: !Ref AppInstance
  ElasticIp:
    Value: !Ref AppElasticIp
  EcrRepositoryName:
    Value: !Ref EcrRepository
  EcrRepositoryUri:
    Value: !GetAtt EcrRepository.RepositoryUri
  DeployBucketName:
    Value: !Ref DeploymentBucket
  SecretArn:
    Value: !Ref AppSecret
  SecretName:
    Value: !Ref SecretName
  SecurityGroupId:
    Value: !Ref AppSecurityGroup
  GitHubActionsRoleArn:
    Value: !GetAtt GitHubActionsRole.Arn
