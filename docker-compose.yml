services:
  qdrant:
    image: qdrant/qdrant:v1.16.2
    restart: unless-stopped
    volumes:
      - qdrant_data:/qdrant/storage
  indexer:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      ACTIVE_PROJECT: medrag
      QDRANT_HOST: qdrant
      QDRANT_PORT: 6333
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      LLAMA_CLOUD_API_KEY: ${LLAMA_CLOUD_API_KEY}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o-mini}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-BAAI/bge-small-en-v1.5}
      EMBEDDING_OUTPUT_DIMENSIONALITY: ${EMBEDDING_OUTPUT_DIMENSIONALITY:-384}
      EMBEDDING_BATCH_SIZE: ${EMBEDDING_BATCH_SIZE:-16}
      CHUNK_SIZE: ${CHUNK_SIZE:-1024}
      CHUNK_OVERLAP: ${CHUNK_OVERLAP:-100}
      MAX_GUIDELINE_FILES: ${MAX_GUIDELINE_FILES:-3}
      PUBMED_ENABLED: ${PUBMED_ENABLED:-true}
      PUBMED_QUERY_LIMIT: ${PUBMED_QUERY_LIMIT:-1}
      PUBMED_MAX_RESULTS: ${PUBMED_MAX_RESULTS:-5}
    volumes:
      - ./src/projects/medrag/data:/app/src/projects/medrag/data
    depends_on:
      - qdrant
    command:
      - sh
      - -c
      - |
        python -m src.wait_for qdrant --host qdrant --port 6333 --timeout 180 && \
        python -m src.cli index --project medrag --skip-if-exists
    restart: "no"
  api:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      ACTIVE_PROJECT: medrag
      QDRANT_HOST: qdrant
      QDRANT_PORT: 6333
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      LLAMA_CLOUD_API_KEY: ${LLAMA_CLOUD_API_KEY}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o-mini}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-BAAI/bge-small-en-v1.5}
      EMBEDDING_OUTPUT_DIMENSIONALITY: ${EMBEDDING_OUTPUT_DIMENSIONALITY:-384}
      EMBEDDING_BATCH_SIZE: ${EMBEDDING_BATCH_SIZE:-16}
      CHUNK_SIZE: ${CHUNK_SIZE:-1024}
      CHUNK_OVERLAP: ${CHUNK_OVERLAP:-100}
    volumes:
      - ./src/projects/medrag/data:/app/src/projects/medrag/data
    depends_on:
      - qdrant
      - indexer
    command:
      - uvicorn
      - src.api.main:app
      - --host
      - 0.0.0.0
      - --port
      - "8000"
    ports:
      - "8000:8000"
    restart: unless-stopped
  ui:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      API_BASE_URL: http://api:8000
    depends_on:
      - api
    command:
      - streamlit
      - run
      - src/ui/app.py
      - --server.address=0.0.0.0
      - --server.port=8501
    ports:
      - "8501:8501"
    restart: unless-stopped

volumes:
  qdrant_data:
