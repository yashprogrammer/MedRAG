services:
  qdrant:
    image: qdrant/qdrant:v1.16.2
    restart: unless-stopped
    volumes:
      - /opt/medrag/data/qdrant:/qdrant/storage

  indexer:
    image: ${APP_IMAGE}
    env_file:
      - /opt/medrag/runtime/app.env
    volumes:
      - /opt/medrag/data/medrag:/app/src/projects/medrag/data
    depends_on:
      - qdrant
    command:
      - sh
      - -c
      - |
        python -m src.wait_for qdrant --host qdrant --port 6333 --timeout 180 && \
        python -m src.cli index --project medrag --skip-if-exists
    restart: "no"

  api:
    image: ${APP_IMAGE}
    env_file:
      - /opt/medrag/runtime/app.env
    volumes:
      - /opt/medrag/data/medrag:/app/src/projects/medrag/data
    depends_on:
      - qdrant
    command:
      - uvicorn
      - src.api.main:app
      - --host
      - 0.0.0.0
      - --port
      - "8000"
    ports:
      - "127.0.0.1:8000:8000"
    restart: unless-stopped

  ui:
    image: ${APP_IMAGE}
    environment:
      API_BASE_URL: http://api:8000
    depends_on:
      - api
    command:
      - streamlit
      - run
      - src/ui/app.py
      - --server.address=0.0.0.0
      - --server.port=8501
    restart: unless-stopped

  proxy:
    image: nginx:1.27-alpine
    depends_on:
      - ui
    ports:
      - "80:80"
    volumes:
      - ./deploy/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    restart: unless-stopped
